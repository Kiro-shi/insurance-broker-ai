### premium.yaml — 费率表

```yaml
# 费率表（结构化矩阵）
# 维度：年龄 × 性别 × 社保身份 × 计划版本
# 医疗险费率通常按年龄段分档

premium:
  currency: "CNY"
  period: "annual"              # annual | monthly
  effective_date: "2025-01-01"
  
  # 费率因子
  factors:
    - age                          # 0-105
    - gender                       # male | female
    - social_insurance             # with | without
    - plan                         # standard | premium | ...
  
  # 基础费率（有社保，标准计划，年缴）
  # 医疗险通常按年龄段分档
  base_rates:
    - age_range: "0-4"
      rate: 798
    - age_range: "5-10"
      rate: 272
    - age_range: "11-15"
      rate: 200                    # 待确认
    - age_range: "16-20"
      rate: 180                    # 待确认
    - age_range: "21-25"
      rate: 220                    # 待确认
    - age_range: "26-30"
      rate: 312
    - age_range: "31-35"
      rate: 400                    # 待确认
    - age_range: "36-40"
      rate: 502
    - age_range: "41-45"
      rate: 700                    # 待确认
    - age_range: "46-50"
      rate: 950
    - age_range: "51-55"
      rate: 1400                   # 待确认
    - age_range: "56-60"
      rate: 1860
    - age_range: "61-65"
      rate: 2580
    - age_range: "66-70"
      rate: 3500                   # 待确认
  
  # 无社保系数
  no_social_multiplier: 2.0        # 待确认，通常无社保版贵很多
  
  # 可选责任的加费
  option_rates:
    outpatient: 500                # 加门急诊的年保费增量
    hospital_allowance: 200        # 加住院津贴
    remote_transfer: 50            # 加异地转诊
    internet_pharmacy: 100         # 加互联网药品
  
  # 家庭折扣
  family_discount:
    - members: 2
      discount: 0.95
    - members: 3
      discount: 0.90
    - members: 4
      discount: 0.85
    - members: 5
      discount: 0.80
  
  # 续保费率调整规则
  renewal_policy: "自然费率，按被保险人续保时年龄重新计费"
  renewal_rate_change: "可能调整，最高年涨30%（监管上限）"
```

### underwriting.yaml — 核保规则

```yaml
underwriting:
  # 健康告知问卷（原文）
  health_questionnaire:
    method: "智能核保"
    full_text_ref: "sources/健康告知_2025B款.pdf"
    
    # 关键健康告知项目（结构化，用于Agent追问引导）
    key_questions:
      - id: "major_disease_history"
        question: "是否曾患恶性肿瘤、心梗、脑出血、冠心病、肾功能不全、肝硬化等严重疾病？"
        impact: "拒保"
      
      - id: "nodule"
        question: "是否有甲状腺结节/乳腺结节/肺结节？"
        impact: "可能除外/可能标体（需看分级）"
        detail: "肺结节符合约定条件可正常投保"
      
      - id: "hypertension"
        question: "是否有高血压（收缩压≥160或舒张压≥100）？"
        impact: "可能拒保/加费"
      
      - id: "diabetes"
        question: "是否有糖尿病？"
        impact: "通常拒保（百万医疗险），建议转防癌医疗险"
      
      - id: "hepatitis"
        question: "是否有乙肝？"
        impact: "可智能核保，有机会承保"
      
      - id: "recent_hospitalization"
        question: "最近2年内是否住院/手术？"
        impact: "需人工核保"
      
      - id: "recent_checkup_abnormal"
        question: "最近1年内体检是否有异常？"
        impact: "需告知具体项目"
      
      - id: "children_specific"
        question: "（少儿）是否早产/低体重/发育迟缓？"
        impact: "2岁以下可能延期"
      
      - id: "female_specific"
        question: "（女性）是否怀孕/有妇科疾病？"
        impact: "怀孕期间通常不能投保"
  
  # 核保复议
  review_support: true
  review_rules:
    - "所有除外疾病可申请核保复议"
    - "9大类70种常见病支持自动复议，最快1年转正常承保"
  
  # 职业核保
  occupation_underwriting:
    excluded: ["大车司机", "高空作业人员", "消防员", "防爆警察", "采矿工人", "特技演员"]
    excluded_detail: "详见《众安特殊职业类别表》"
    note: "职业变更须30日内通知，若变更后属拒保范围则终止保障"
  
  # 特殊人群
  special_populations:
    pregnant: "不能投保"
    children_under_2: "早产/低体重需人工核保"
    elderly_over_60: "部分计划限制"
  
  # 投保金额限制
  sum_insured_limits:
    - condition: "age < 40"
      max_general: 3000000
    - condition: "age >= 40"
      max_general: 2000000         # 待确认
```

