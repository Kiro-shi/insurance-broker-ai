## 数据维护流程

### 新增产品
1. KK 上传原始文件（条款/费率/健告/服务手册/医院列表等）
2. 我（Agent）读取 → 提取结构化数据 → 生成所有 YAML 文件
3. KK 审核关键字段（费率数字/免责/健康告知）
4. 更新 _index.yaml
5. 标记 status: "active"

### 产品更新
1. KK 通知"XX产品2026版有新条款"
2. 原产品目录标记 status: "deprecated"，移入 archived/
3. 新增版本目录，changelog.yaml 记录变更点
4. skill 匹配时只推荐 status: "active" 的产品

### 定期巡检（心跳任务）
- 每季度提醒 KK：检查是否有产品下架/停售/费率变化
- 自动搜索该产品的最新市场信息（multi-search-engine）→ 如有变动通知KK
