# 保险产品数据结构规范 v2

## 设计原则
1. 每个产品对应一个目录，而非单文件（文件太多太大）
2. 核心字段必须结构化（用于规则引擎筛选），说明文本保留原文（用于 LLM 解释）
3. 区分"机器可筛选"和"人/LLM 可阅读"
4. 支持产品版本迭代（旧版标记 deprecated，新版引用变更记录）

## 目录结构

```
data/insurance/
├── _schema.yaml                    # 本规范文件
├── _index.yaml                     # 产品总索引
│
├── medical/                        # 医疗险
│   ├── _overview.yaml              # 医疗险品类的通用知识
│   └── 众安-个人医疗险-2025B款/
│       ├── product.yaml            # 产品基本信息（主文件，所有机器可筛选字段）
│       ├── coverage.yaml           # 保障责任详细（必选+可选，每项的保额/免赔/比例/限制）
│       ├── premium.yaml            # 费率表（年龄×性别×社保×计划 矩阵）
│       ├── underwriting.yaml       # 健康告知+核保规则+职业限制+特殊人群
│       ├── services.yaml           # 增值服务+使用条件+医院列表
│       ├── claims.yaml             # 理赔流程+所需材料+时效
│       ├── exclusions.yaml         # 免责条款（结构化分类）
│       ├── plans.yaml              # 计划书（不同方案组合）
│       ├── faq.yaml                # 常见问题（从经纪人角度）
│       ├── broker_notes.yaml       # 经纪人专属备注（优劣/适合人群/坑点/话术）
│       ├── changelog.yaml          # 版本变更记录
│       └── sources/                # 原始文件（PDF/截图等，可选存放）
│           ├── 条款_2025B款.pdf
│           ├── 费率表_2025.xlsx
│           └── ...
│
├── critical/                       # 重疾险（同结构）
├── life/                           # 寿险
├── accident/                       # 意外险
└── savings/                        # 增额寿/年金
```

## 各文件字段定义

### product.yaml — 产品基本信息（机器可筛选）

```yaml
product_id: "medical-zhongan-2025B"
name: "个人医疗保险（互联网2025版B款）"
brand: "众安尊享e生"
company: "众安在线财产保险股份有限公司"
category: "医疗险"
sub_category: "百万医疗险"
status: "active"              # active | deprecated | pending_review
effective_date: "2025-01-01"  # 条款生效日
last_updated: "2026-07-03"

# 投保规则（机器筛选用，全部结构化）
enrollment:
  min_age: 30                  # 天
  max_age: 70                  # 周岁
  max_age_unit: "years"        # days | years
  max_renewal_age: 105
  guarantee_renewal: false     # 是否保证续保
  guarantee_years: null
  waiting_period:
    accident: 0                # 意外无等待期
    disease: 30                # 天，待确认
  cooling_off: 15              # 犹豫期天数
  coverage_period: "1年"
  
  # 社保要求
  social_insurance:
    required: false            # 是否必须有社保才能投
    with_social: "费率A"
    without_social: "费率B（通常更高）"

  # 职业限制
  occupation:
    excluded_categories: ["大车司机", "高空作业", "消防员", "防爆警察", "矿工"]
    excluded_industry: []
    has_occupation_list: true
    occupation_list_ref: "sources/职业类别表.pdf"

  # 地域限制
  region:
    sale_regions: ["全国（除港澳台）"]   # 销售区域
    hospital_regions: ["中国大陆"]       # 就医区域
    excluded_hospitals: []               # 除外医院列表

  # 年龄相关特殊规则
  age_rules:
    - condition: "age >= 56"
      requirement: "需体检"
    - condition: "age >= 61"
      requirement: "仅支持部分计划"
```

