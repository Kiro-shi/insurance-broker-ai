### exclusions.yaml — 免责条款

```yaml
exclusions:
  categories:
    - name: "故意/违法"
      items:
        - "投保人故意杀害/伤害被保险人"
        - "被保险人故意自杀/自伤（无民事行为能力人除外）"
        - "故意犯罪/抗拒刑事强制措施/拘禁/入狱"
        - "殴斗/醉酒/吸毒/违规使用麻醉精神药品"
        - "未遵医嘱擅自用药"
        - "酒驾/无证驾驶/无有效行驶证机动车"
      impact: "全不赔"
    
    - name: "既往症与等待期"
      items:
        - "既往症及特别约定除外疾病"
        - "等待期内确诊疾病"
        - "未经科学/医学认可的试验性/研究性治疗"
        - "基因疗法（除审核通过细胞免疫疗法）"
        - "职业病/医疗事故"
        - "非约定医院就诊"
    
    - name: "不合理治疗"
      items:
        - "未经医生建议自行治疗/自行购药"
        - "虽持处方但非开方医生执业机构购买（外购药除外）"
        - "非医疗机构治疗（临终关怀/基因检测除外）"
        - "处方超过30天量"
        - "特药适应症不符/已耐药"
        - "代诊/挂床住院/不符合入院标准/拒不出院"
    
    - name: "特定治疗/状态"
      items:
        - "矮小症/早熟/肥胖症/胃减容术"
        - "整形/美容/变性及并发症"
        - "怀孕/流产/分娩/避孕/节育/不孕不育"
        - "牙科（非意外）/屈光不正/康复器具"
        - "包皮/包茎/性功能障碍"
        - "除7种人工器官外的材料费"
      note: "康复治疗费符合约定可赔"
    
    - name: "职业与运动"
      items:
        - "《众安特殊职业类别表》中的职业"
        - "职业运动/可获得报酬的运动"
        - "高风险运动（潜水/滑翔/跳伞/蹦极/攀岩/武打/赛车/探险等）"
    
    - name: "特定疾病"
      items:
        - "性病/精神行为障碍/遗传病/先天畸形"
        - "HIV/AIDS（职业/输血/器官移植原因除外）"
    
    - name: "不可抗力"
      items:
        - "战争/军事行动/暴乱/武装叛乱"
        - "核爆炸/核辐射/核污染/化学污染"
    
    - name: "外购药/特药专用免责"
      items:
        - "药品/器械未在中国获批"
        - "药品/器械适应症不符"
        - "港澳台或境外治疗"
        - "特药未在指定药店购买"
        - "未按处方审核流程操作"
        - "基因检测与用药方案无关"

  # 争议高发免责项（经纪人需特别提醒客户）
  high_risk_exclusions:
    - "既往症不赔 — 很多客户以为'现在不严重'就能赔"
    - "等待期出险不赔 — 不是买了第二天就生效"
    - "外购药未走处方审核流程 — 自己买的不赔"
    - "职业变更未告知 — 可能导致保障终止"
    - "非指定医院 — 私立/社区/康复医院需确认"
```

