# 众安个人医疗保险（互联网2025版B款）
# 注册号: C00017932512025120573903
# 数据来源: KK 上传的保险条款 PDF

product:
  name: "个人医疗保险（互联网2025版B款）"
  company: "众安在线财产保险股份有限公司"
  brand: "众安尊享e生系列"
  type: "百万医疗险"
  renewal: "不保证续保（1年期，最高可续至105岁）"

enrollment:
  initial_age: "30天 - 70周岁"
  max_renewal_age: 105
  health_disclosure: "有健康告知，支持智能核保"
  waiting_period: "有（具体天数待费率表确认）"
  cooling_off: "15天犹豫期"

coverage:
  required:
    - name: "一般医疗保险金"
      scope: 
        - "住院医疗费用（床位/护理/ICU/诊疗/检查/药品/手术/重建手术/理疗/医疗器械/耐用设备/精神心理/救护车/手术机器人）"
        - "特殊门诊（肾透析/恶性肿瘤门诊治疗/器官移植后抗排异）"
        - "门诊手术"
        - "住院前后门急诊（前30天+后30天）"
        - "出院后特别关怀（家庭护理/康复治疗/临终关怀，限30天）"
      deductible: "约定免赔额"
      reimbursement: "约定比例，社保后赔付"
      coverage_period_extension: "满期未出院：继续承担最多30天费用"

    - name: "特定疾病医疗保险金"
      scope: "同上5类费用，须因特定疾病（含120种重疾等）"
      deductible: "约定免赔额"
      reimbursement: "约定比例"
      note: "覆盖120种特定疾病，初次确诊后的治疗费用"

    - name: "外购药品及外购医疗器械费用医疗保险金"
      scope:
        - "院外购买处方药及医疗器械（须医生处方，单次≤30天量）"
        - "药品须NMPA批准，器械须NMPA注册"
      exclusions:
        - "假体、义肢、轮椅、康复设备"
        - "营养补充类、免疫功能调节类、美容减肥类、滋补中草药"
      deductible: "约定免赔额"
      reimbursement: "约定比例"

    - name: "特定药品费用医疗保险金"
      sub_items:
        - name: "恶性肿瘤重度院外特药+基因检测"
          detail: "靶向药物+免疫治疗药物，须在指定药店购买，须处方审核"
          gene_test: "须在指定基因检测机构，检测与用药方案相关"
          extension: "满期治疗未结束：最多继续30天"
        - name: "罕见病特定药品费用"
          detail: "须处方审核，指定药店购买"
          extension: "满期治疗未结束：最多继续30天"
        - name: "特定进口药品及特定医疗机构住院医疗"
          detail: "临床急需进口药品+指定医疗机构住院，须处方审核"
      deductible: "约定免赔额"
      reimbursement: "约定比例"

    - name: "恶性肿瘤先进疗法医疗保险金"
      sub_items:
        - "质子重离子治疗（指定机构）"
        - "硼中子俘获治疗（指定机构）"
        - "光免疫疗法（指定机构）"

  optional:
    - name: "特定疾病异地转诊公共交通+住宿"
      detail: "患者+1名亲属陪同，飞机限经济舱，火车限软卧/一等座，住宿限标准间"
      limits: "住宿累计最多180天"
    - name: "特定疾病住院津贴"
      detail: "按天给付，累计最多180天"
    - name: "门急诊医疗保险金"
      scope: "诊疗/急诊/检查/药品/理疗/中医/牙科(意外)/精神心理"
    - name: "互联网药品费用医疗保险金"
      detail: "指定互联网医院诊疗+指定互联网药店购药，单次≤30天量"

deductible_mechanism:
  type: "年度累计免赔额"
  can_use_social_insurance: "由投保时约定"
  example: "免赔1万，首次就诊自付5000后免赔余额剩5000，二次就诊8000后抵扣完，赔付3000×比例"

exclusions:
  key_items:
    - "既往症及特别约定除外疾病"
    - "等待期内确诊疾病"
    - "试验性/研究性治疗、基因疗法（除审核通过细胞免疫疗法）"
    - "职业病、医疗事故"
    - "非约定医院就诊"
    - "代诊/挂床/不符合入院标准"
    - "矮小/早熟/肥胖/整形/美容/变性"
    - "怀孕/流产/分娩/不孕不育"
    - "牙科（非意外）/屈光不正/康复器具"
    - "包皮过长/包茎/性功能障碍"
    - "除特定人工器官外的材料费"
    - "高风险运动/职业运动"
    - "性病/精神行为障碍/遗传病/先天畸形"
    - "HIV/AIDS（职业/输血/器官移植原因除外）"
    - "战争/核/化学污染"

services:
  - "直付服务：网络医疗机构直接结算（须预授权）"
  - "预授权：住院/化疗放疗/耐用设备/8000元以上项目须提前5个工作日申请"
  - "紧急情况：48小时内通知保险人"
  - "外购药：处方审核+指定药店购买流程"

broker_notes:
  strengths:
    - "保障全面：必选5项几乎覆盖所有核心医疗场景"
    - "外购药械放开：不限清单，不限疾病"
    - "三种恶性肿瘤先进疗法全覆盖：质子重离子+硼中子+光免疫"
    - "住院前后门急诊覆盖广：前30天+后30天"
    - "出院后康复护理+临终关怀，行业领先"
    - "可选责任丰富：门急诊/住院津贴/互联网药品/异地转诊"
    - "支持网络医院直付"
  weaknesses:
    - "不保证续保（最大短板）"
    - "须预授权（住院等须提前申请）"
    - "外购药须处方审核+指定药店"
    - "某些材料费/人工器官不覆盖"
    - "等待期限制"
  note: "具体保额、免赔额、给付比例、费率需等KK提供费率表和保单样本补充"
